# Real vector store for the shared memory — the store WE drive (no LLM extraction, we own that in the gate).
#   1. docker compose -f docker-compose.qdrant.yml up -d
#   2. export KF_MEM_STORE=qdrant QDRANT_URL=http://localhost:6333
#   3. (optional real embeddings — else the local hashing embedder is used)
#      export EMBED_URL=https://api.openai.com/v1/embeddings EMBED_KEY=sk-… EMBED_MODEL=text-embedding-3-small EMBED_DIM=1536
#      # or point EMBED_URL at a local Ollama / TEI / vLLM endpoint — no OpenAI required
#   4. node engine/test/vector-proof.mjs        # same proof, now on real Qdrant
# pgvector is a drop-in alternative (same vector-store.mjs contract, Postgres underneath).
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333", "6334:6334"]
    volumes: ["kf_qdrant:/qdrant/storage"]
    restart: unless-stopped
volumes:
  kf_qdrant:
